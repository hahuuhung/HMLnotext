name: CI Workflow

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Frontend dependencies
      run: npm ci

    - name: Lint Frontend
      run: npm run lint

    - name: Build Frontend
      run: npm run build

    - name: Test Frontend
      run: npm run test

    - name: Install Backend dependencies
      working-directory: ./server
      run: npm ci

    - name: Generate Prisma Client
      working-directory: ./server
      run: npx prisma generate

    - name: Build Backend
      working-directory: ./server
      run: npm run build

    - name: Test Backend
      working-directory: ./server
      run: npm run test
